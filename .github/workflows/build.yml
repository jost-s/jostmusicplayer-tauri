name: Build

# Cross-platform packaging job, used two ways:
#   * standalone (manual dispatch / PRs) as a smoke test — uploads the installers
#     as workflow artifacts and publishes nothing;
#   * called by release.yml as a reusable workflow — when given `release_id` it
#     uploads the bundles straight to that GitHub release instead of as artifacts.
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_id:
        description: "If set, upload bundles to this release instead of as artifacts."
        type: string
        required: false
        default: ""
  pull_request:
    branches: [main]
    paths:
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src-tauri/tauri.conf.json"
      - "src-tauri/.cargo/**"
      - "src-tauri/rust-toolchain.toml"
      - ".github/workflows/build.yml"
      - ".github/workflows/release.yml"

jobs:
  build-tauri:
    name: Build ${{ matrix.label }}
    # Lets tauri-action upload to a release when called with a release_id; unused
    # but harmless on the artifact-only dry-run path.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin"
          - os: macos-latest
            label: macOS (Intel)
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-22.04
            label: Linux
            args: ""
          - os: windows-latest
            label: Windows
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        # rustup auto-installs the channel, components, and targets (including the
        # two macOS triples) pinned in src-tauri/rust-toolchain.toml.
        working-directory: src-tauri
        run: rustup show

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            cmake \
            build-essential \
            file \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Empty on the dry-run path -> just builds; set by release.yml -> uploads
          # the bundles to that release.
          releaseId: ${{ inputs.release_id }}
          args: ${{ matrix.args }}

      # Dry-run only (no release_id): keep the bundles as inspectable artifacts.
      - name: Upload bundles
        if: ${{ !inputs.release_id }}
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.label }}
          # Only the finished installers — NOT the uncompressed staging trees the
          # bundlers leave behind (e.g. appimage/*.AppDir, deb/<pkg>/), which are
          # full second copies of the bundled runtime and balloon the upload.
          # Covers both layouts: target/release/bundle (Linux, Windows — no
          # --target) and target/<triple>/release/bundle (macOS legs). Patterns
          # that match nothing on a given OS are simply ignored.
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7
