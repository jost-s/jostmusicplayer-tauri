name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          prerelease: false

  build-tauri:
    name: Build bundles
    needs: create-release
    # Reuse the matrix build from build.yml, passing the draft release's id so the
    # shared job uploads the bundles to it instead of as workflow artifacts. The
    # GITHUB_TOKEN needs contents: write to attach assets (the called job requests
    # it too, but the caller must grant it).
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      release_id: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    name: Publish release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
